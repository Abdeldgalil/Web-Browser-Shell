name: Build Android APK (Capacitor)

on:
  push:
    branches: [main]
    paths:
      - "artifacts/capacitor-app/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/capacitor-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Add Android platform (first run only)
        run: |
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: artifacts/capacitor-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: artifacts/capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk
